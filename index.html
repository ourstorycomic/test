<!DOCTYPE html>
<html>
<head>
<title>Count Total Visited</title>

<style type="text/css">
.counter_style {
background-color:black;
color:cyan;
font-weight:bold;
}

p {
font-size:18px;
font-weight:bold;
{
</style>

<script type="text/javascript" lang="Eng">
expireDate = new Date
expireDate.setMonth(expireDate.getMonth()+6)
count_num = eval(cookieVal("counter_style_Visited"))
count_num++
document.cookie = "counter_style_Visited="+count_num+";expires=" + expireDate.toGMTString()

function cookieVal(cookieName) {
thisCookie = document.cookie.split("; ")
for (i=0; i<thisCookie.length; i++){
	if (cookieName == thisCookie[i].split("=")[0]){
		return thisCookie[i].split("=")[1]
	}
}
return 0
}

function page_countvisit(){
for (i=0;i<(7-count_num.toString().length);i++)
document.write('<span class="counter_style">0</span>')
for (y=0;y<(count_num.toString().length);y++)
document.write('<span class="counter_style">'+count_num.toString().charAt(y)+'</span>')
}

</script>

</head>
<body>
<p>You have visited this page <script type="text/javascript" lang="Eng">page_countvisit(count_num);</script> times.</p>


<script type = "text/javascript">
var days = 730; // the cookie will expire = 2 years
var lastvisit=new Object();
var firstvisitmsg="<b>This is your first visit to this page.</b> <b>Welcome!</b>"; 
lastvisit.subsequentvisitmsg="<p style='font-size:18px;'>Welcome back visitor!</p> <b>Your last visit was on</b> <b style='font-size:18px; color:blueviolet;'>[date_displayed]</b>";

lastvisit.getCookie=function(Name){ 
var re=new RegExp(Name+"=[^;]+", "i"); 
if (document.cookie.match(re)) 
return document.cookie.match(re)[0].split("=")[1];
return''; 
}

lastvisit.setCookie=function(name, value, days){ 
var expireDate = new Date();

var expstring=expireDate.setDate(expireDate.getDate()+parseInt(days));
document.cookie = name+"="+value+"; expires="+expireDate.toGMTString()+"; path=/";
}

lastvisit.showmessage = function() {
var wh = new Date();
if (lastvisit.getCookie("visit_record") == "") { 
lastvisit.setCookie("visit_record", wh, days); 
document.write(firstvisitmsg);
}

else {
var lv = lastvisit.getCookie("visit_record");
var lvp = Date.parse(lv);
var now = new Date();
now.setTime(lvp);
var day = new Array("Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday");
var month = new Array ("January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December");
var dd = now.getDate();
var dy = now.getDay();
dy = day[dy];
var mn = now.getMonth();
mn = month[mn];
yy = now.getFullYear();
var hh = now.getHours();
var ampm = "AM";
if (hh >= 12) {ampm = "PM"}
if (hh >12){hh = hh - 12};
if (hh == 0) {hh = 12}
if (hh < 10) {hh = "0" + hh};
var mins = now.getMinutes();
if (mins < 10) {mins = "0"+ mins}
var secs = now.getSeconds();
if (secs < 10) {secs = "0" + secs}
var dispDate = dy + ", " + mn + " " + dd + ", " + yy + " " + hh + ":" + mins + ":" + secs + " " + ampm
document.write(lastvisit.subsequentvisitmsg.replace("\[date_displayed\]", dispDate))
}

lastvisit.setCookie("visit_record", wh, days);

}

lastvisit.showmessage();
</script>
</body>
</html>
